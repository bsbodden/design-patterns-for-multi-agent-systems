spring:
  application:
    name: smart-triage-demo

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:16379}

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o

    mcp:
      client:
        enabled: true
        sse:
          connections:
            redis-memory:
              url: ${MCP_SERVER_URL:http://localhost:18080}
              sse-endpoint: /sse

demo:
  auto-run: false
  backend:
    demo2-url: ${DEMO2_URL:http://localhost:8882}
    demo3-url: ${DEMO3_URL:http://localhost:8883}

server:
  port: 8881
  servlet:
    async:
      timeout: 300000

spring.mvc.async.request-timeout: 300000
