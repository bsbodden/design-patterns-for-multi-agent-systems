embabel.agent.application.name=intervention-planner-demo

# Default LLM for simple tasks (cheap, fast)
embabel.models.default-llm=gpt-4.1-mini

# Named LLM roles
embabel.models.llms.cheapest=gpt-4.1-nano
embabel.models.llms.best=gpt-4.1

# HTTP client timeouts
embabel.agent.platform.http-client.read-timeout=5m
embabel.agent.platform.http-client.connect-timeout=1m

# Server port
server.port=8883

# Redis connection
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:16379}
